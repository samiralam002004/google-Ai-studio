name: snake_io_online
description: A beautiful slither snake game with offline bots and real-time feel.
version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Game framework for smooth 60fps renders & physics collision
  flame: ^1.6.0

  # Google Play Ads monetization
  google_mobile_ads: ^2.3.0

  # Rich icon library
  cupertino_icons: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
